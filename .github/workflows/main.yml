name: Enviroment lecture
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch: 
env:
 MONGODB_DB_NAME: demo
 PORT: 8080
jobs:
  test:
    env: 
     MONGODB_CLUSTER_ADDRESS: cluster0.qbhued1.mongodb.net
     MONGODB_USERNAME: DummyUser
     MONGODB_PASSWORD: AT5Jq6wW4QEDZxDm
    environment: testing
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-deps-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Run server
        run: npm start & npx wait-on http://127.0.0.1:$PORT
      - name: Run tests
        run: npm test
      - name: Output information
        run:  'echo "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"'
  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Output information
        run: |        
          echo  "MONGODB_USERNAME: ${{ env.MONGODB_USERNAME }}"
          echo  "MONGODB_DB_NAME: ${{ env.MONGODB_DB_NAME }}"
          
